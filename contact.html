<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Top Notch</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background: url('logoo.png') no-repeat center center fixed;
  background-size: cover;
  color:white;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background: rgba(2,6,23,0.9);
  position:relative;
}

.logo {
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img {
  width:70px;
}

.menu-icon {
  font-size:28px;
  cursor:pointer;
}

.nav-menu {
  position:absolute;
  top:60px;
  right:20px;
  background:#020617;
  border-radius:10px;
  display:none;
  flex-direction:column;
  padding:15px;
  z-index:1000;
}

.nav-menu a {
  color:white;
  text-decoration:none;
  margin:10px 0;
}

/* SECTION */
.section {
  padding:40px 20px;
  background: rgba(2,6,23,0.9);
}

h1 {
  text-align:center;
  margin-bottom:20px;
}

/* CONTACT INFO */
.contact-info {
  text-align:center;
  margin-bottom:30px;
}

.contact-info p {
  margin:10px 0;
}

/* SOCIAL ICONS */
.socials {
  display:flex;
  justify-content:center;
  gap:20px;
  margin-bottom:30px;
}

.socials a {
  font-size:24px;
  color:#facc15;
  transition:0.3s;
}

.socials a:hover {
  color:#eab308;
}

/* FORM */
.contact-form {
  max-width:500px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.contact-form input,
.contact-form textarea {
  padding:12px;
  border:none;
  border-radius:5px;
  outline:none;
  font-family:'Poppins', sans-serif;
}

.contact-form textarea {
  height:120px;
  resize:none;
}

.contact-form button {
  padding:12px;
  background:#facc15;
  border:none;
  border-radius:5px;
  font-weight:600;
  cursor:pointer;
  color:#020617;
}

.contact-form button:hover {
  background:#eab308;
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png">
    <h2>Top Notch</h2>
  </div>

  <div class="menu-icon" onclick="toggleMenu()">☰</div>

  <div class="nav-menu" id="menu">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="courses.html">Courses</a>
    <a href="hire.html">Hire</a>
    <a href="contact.html">Contact</a>
  </div>
</header>

<section class="section">
  <h1>Contact Us</h1>

  <!-- CONTACT DETAILS -->
  <div class="contact-info">
    <p><strong>Email:</strong> topnotch011@yahoo.com</p>
    <p><strong>Phone:</strong> +234 806 222 3400</p>
  </div>

  <!-- SOCIAL MEDIA -->
  <div class="socials">
    <a href="#"><i class="fab fa-instagram"></i></a>
    <a href="#"><i class="fab fa-facebook"></i></a>
    <a href="https://wa.me/2348062223400"><i class="fab fa-whatsapp"></i></a>
  </div>

  <!-- FORM (FORMspree ready) -->
  <form class="contact-form" action="https://formspree.io/f/maqlpaqk" method="POST">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" placeholder="Write your message..." required></textarea>
    <button type="submit">Send Message</button>
  </form>

</section>

<script>
function toggleMenu() {
  const menu = document.getElementById("menu");
  menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
}
</script>

</body>
</html>
